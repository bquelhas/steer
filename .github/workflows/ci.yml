# CI for the Android companion: unit tests (incl. the VibePlanner and the
# fingerprint-table regression net) + a debug APK assembly to catch resource/
# manifest breakage. The watch (Pebble C) side is NOT built here — the Pebble SDK
# toolchain isn't CI-friendly; it stays a local `pebble build` before releases.
# Note: the Maps glyph PNGs are untracked (Google artwork), so the two asset-based
# tests skip themselves in CI via assumeTrue; the table↔ground-truth test still runs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: android/app/build/reports/tests/
